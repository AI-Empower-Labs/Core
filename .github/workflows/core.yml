# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Core

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'AEL.Core/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'AEL.Core/**'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x
    - name: Get build number
      id: bn
      run: echo "num=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release /p:PackageVersion=1.0.${{ steps.bn.outputs.num }}
    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release
    - name: Pack NuGet
      run: dotnet pack AEL.Core/AEL.Core.csproj --configuration Release --no-build --output ./artifacts/nupkgs /p:PackageVersion=1.0.${{ steps.bn.outputs.num }} /p:ContinuousIntegrationBuild=true
    - name: Publish NuGet
      #if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if compgen -G "./artifacts/nupkgs/*.nupkg" > /dev/null; then
          dotnet nuget push ./artifacts/nupkgs/*.nupkg --source https://nuget.pkg.github.com/AI-Empower-Labs/index.json --api-key ${{ secrets.NUGET_PAT }} --skip-duplicate
        else
          echo "No NuGet packages found to publish."
        fi
        if compgen -G "./artifacts/nupkgs/*.snupkg" > /dev/null; then
          dotnet nuget push ./artifacts/nupkgs/*.snupkg --source https://nuget.pkg.github.com/AI-Empower-Labs/index.json --api-key ${{ secrets.NUGET_PAT }} --skip-duplicate
        else
          echo "No symbol packages found to publish."
        fi
